<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:linear-gradient(45deg,#d4af37,#fff);
  color:black;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  padding:30px;
}

/* FORM */
.form{
  background:#111;
  padding:20px;
  border-radius:15px;
}

.form input,.form textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#000;
  color:white;
}

.form button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#d4af37,#fff);
}

/* LIST */
.list{
  background:#111;
  padding:20px;
  border-radius:15px;
}

.card{
  background:#000;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.card button{
  margin-left:5px;
  border:none;
  padding:5px 10px;
  border-radius:5px;
}

.edit{background:#4ade80;}
.delete{background:#f87171;}
</style>
</head>

<body>

<div class="header">
  Admin Dashboard
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="form">
<input id="title" placeholder="Title">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Link">
<input id="categoryInput" placeholder="Category">
<input id="rating" placeholder="Rating">

<textarea id="desc" placeholder="Description"></textarea>
<textarea id="pros" placeholder="Pros"></textarea>
<textarea id="cons" placeholder="Cons"></textarea>
<textarea id="verdict" placeholder="Verdict"></textarea>

<button onclick="addProduct()">Save Product</button>
</div>

<div class="list" id="adminProducts"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
